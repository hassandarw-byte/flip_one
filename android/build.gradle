// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

ext {
  ndkVersion = "26.1.10909125"
  googleMobileAdsJson = [
    getStringValue: { key, defaultValue ->
      if (key == "android_app_id") return "ca-app-pub-4988944368021582~4442685498"
      return defaultValue
    },
    isFlagEnabled: { key, defaultValue ->
      if (key == "delay_app_measurement_init") return true
      if (key == "optimize_initialization") return true
      if (key == "optimize_ad_loading") return true
      return defaultValue
    }
  ]
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
