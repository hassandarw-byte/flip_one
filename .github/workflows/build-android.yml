name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Patch graphicsConversions.h for C++17 compatibility
        run: |
          FILE="node_modules/react-native/ReactCommon/react/renderer/core/graphicsConversions.h"
          if [ -f "$FILE" ]; then
            sed -i 's/#include <format>/\/\/ C++20 format removed for C++17 compat/g' "$FILE"
            sed -i 's/return std::format("{}%", dimension\.value);/return std::to_string(dimension.value) + std::string("%");/g' "$FILE"
            echo "Patched: $(grep -n 'to_string\|format' $FILE | head -5)"
          else
            echo "File not found at $FILE"
            find node_modules/react-native -name "graphicsConversions.h" 2>/dev/null
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          CI: 1
          EXPO_NO_TELEMETRY: 1

      - name: Remove Windows-only path from gradle.properties
        run: sed -i '/android\.cxx\.buildRoot/d' android/gradle.properties

      - name: Enable New Architecture (required by Reanimated)
        run: |
          sed -i 's/newArchEnabled=.*/newArchEnabled=true/' android/gradle.properties || echo 'newArchEnabled=true' >> android/gradle.properties
          grep 'newArchEnabled' android/gradle.properties

      - name: Add AdMob and NDK config to root build.gradle
        run: |
          echo "" | base64 --decode >> android/build.gradle
          echo "AdMob config appended to build.gradle"

      - name: Enable 16KB memory page size support
        run: |
          APP_BUILD="android/app/build.gradle"
          if grep -q 'cmake {' "$APP_BUILD"; then
            sed -i '/cmake {/a\                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"' "$APP_BUILD"
            echo "16KB: cmake argument added"
          else
            echo "android { defaultConfig { externalNativeBuild { cmake { arguments \"-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON\" } } } }" >> "$APP_BUILD"
            echo "16KB: appended cmake block to build.gradle"
          fi
          grep -n "FLEXIBLE_PAGE\|cmake" "$APP_BUILD" | head -10

      - name: Decode and place keystore
        run: |
          echo "" | base64 --decode > android/app/flipone-release.keystore
          echo "Keystore placed: $(wc -c < android/app/flipone-release.keystore) bytes"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release AAB (signed via Gradle properties)
        run: |
          KEYSTORE="$(pwd)/android/app/flipone-release.keystore"
          cd android
          ./gradlew :app:bundleRelease --no-daemon \
            "-Pandroid.injected.signing.store.file=${KEYSTORE}" \
            "-Pandroid.injected.signing.store.password=Hh@2020h_1985%" \
            "-Pandroid.injected.signing.key.alias=flipone" \
            "-Pandroid.injected.signing.key.password=Hh@2020h_1985%"
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Verify AAB
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          [ -f "$AAB" ] && echo "SUCCESS: $(du -h $AAB)" || (echo "FAILED: AAB not found" && exit 1)

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: flip-one-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
