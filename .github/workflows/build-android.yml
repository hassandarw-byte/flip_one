name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          CI: 1
          EXPO_NO_TELEMETRY: 1

      - name: Remove Windows-only cxx build path from gradle.properties
        run: sed -i '/android\.cxx\.buildRoot/d' android/gradle.properties

      - name: Decode and place keystore
        run: |
          echo "" | base64 --decode > android/app/flipone-release.keystore
          echo "Keystore size: $(wc -c < android/app/flipone-release.keystore) bytes"

      - name: Apply release signing config to app/build.gradle
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let src = fs.readFileSync(path, 'utf8');

          const releaseSigningBlock = `
              release {
                  storeFile file('flipone-release.keystore')
                  storePassword 'Hh@2020h_1985%'
                  keyAlias 'flipone'
                  keyPassword 'Hh@2020h_1985%'
              }`;

          // Add release signing config inside signingConfigs block
          if (!src.includes("storeFile file('flipone-release.keystore')")) {
              src = src.replace(
                  /(signingConfigs\s*\{[\s\S]*?)(^\s*\})/m,
                  (match, inner, closing) => inner + releaseSigningBlock + '\n    ' + closing
              );
          }

          // Set signingConfig for release buildType
          if (!src.includes('signingConfig signingConfigs.release')) {
              src = src.replace(
                  /(buildTypes\s*\{[\s\S]*?release\s*\{)/,
                  '$1\n            signingConfig signingConfigs.release'
              );
          }

          fs.writeFileSync(path, src);
          console.log('Signing config applied successfully');
          EOF

      - name: Add ndkVersion and AdMob config to root build.gradle
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = 'android/build.gradle';
          let src = fs.readFileSync(path, 'utf8');

          // Add ndkVersion to ext block if not present
          if (!src.includes('ndkVersion')) {
              src = src.replace(
                  /^(apply plugin: "expo-root-project")/m,
                  `ext {\n    ndkVersion = "26.1.10909125"\n    buildToolsVersion = rootProject.ext.buildToolsVersion ?: "35.0.0"\n}\n\n$1`
              );
          }

          fs.writeFileSync(path, src);
          console.log('Root build.gradle updated');
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Show Android tasks (diagnostic)
        run: cd android && ./gradlew :app:tasks --no-daemon 2>&1 | grep -E "(bundle|assemble)" | head -20 || true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
        continue-on-error: true

      - name: Build Release AAB
        run: cd android && ./gradlew :app:bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Verify AAB was created
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          if [ -f "$AAB" ]; then
            echo "SUCCESS: AAB created ($(du -h $AAB | cut -f1))"
          else
            echo "ERROR: AAB not found"
            exit 1
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: flip-one-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
